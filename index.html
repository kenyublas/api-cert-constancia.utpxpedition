<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación - Kenyū Scott</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #2b2b2b;
            /* Color gris oscuro estándar de visores PDF */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <iframe src="carta_practica.pdf#view=FitH">
        Este navegador no soporta la visualización de PDFs.
        <a href="carta_practica.pdf">Haz clic aquí para descargar el PDF.</a>
    </iframe>
</body>

</html>
